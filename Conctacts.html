<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - PHYTOTOP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .contact-page { padding: 100px 20px; max-width: 900px; margin: 0 auto; }
        .contact-container { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-top: 40px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; }
        .btn-submit { background: #27ae60; color: white; border: none; padding: 14px 28px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.3s; }
        .btn-submit:hover { background: #219653; }
        .back-home { display: inline-block; margin-bottom: 20px; color: #27ae60; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body style="background-color: #f9f9f9;">

    <div class="contact-page">
        <a href="index.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Retour à l'accueil</a>
        
        <div class="header" style="text-align: center;">
            <div class="header-label">CONTACT</div>
            <h1>Écrivez-<span class="highlight">Nous</span></h1>
            <p class="header-subtitle">Une question ? Un besoin spécifique ? Notre équipe vous répond sous 24h.</p>
        </div>

        <div class="contact-container">
            <form action="traitement-contact.php" method="POST">
                <div class="form-group">
                    <label for="nom">Nom Complet</label>
                    <input type="text" id="nom" name="nom" class="form-control" placeholder="Votre nom" required>
                </div>
                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" name="email" class="form-control" placeholder="Votre email" required>
                </div>
                <div class="form-group">
                    <label for="message">Votre Message</label>
                    <textarea id="message" name="message" class="form-control" rows="6" placeholder="Expliquez-nous votre besoin..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Envoyer mon Message</button>
            </form>
        </div>
    </div>

</body>
</html>
